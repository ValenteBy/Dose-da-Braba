version: "3.8"

services:
  db:
    image: postgres:15
    container_name: braba-db
    restart: always
    environment:
      POSTGRES_DB: dose_da_braba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
